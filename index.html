<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Memória</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <h1>🧠 Jogo da Memória</h1>

  <!-- Stats bar -->
  <div id="stats-bar">
    <div class="stat">
      <span class="stat-label">Jogadas</span>
      <span class="stat-value" id="moves-count">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Tempo</span>
      <span class="stat-value" id="timer">00:00</span>
    </div>
  </div>

  <!-- Restart button -->
  <button id="restart-btn">🔄 Reiniciar</button>

  <!-- Game board -->
  <div id="game-container"></div>

  <!-- Ranking button -->
  <button id="ranking-btn">🏆 Ranking</button>

  <!-- Victory modal -->
  <div id="victory-modal">
    <div class="modal-box">
      <h2>🎉 Parabéns!</h2>
      <p>Você completou o jogo!</p>
      <p>Jogadas: <span class="highlight" id="final-moves">-</span></p>
      <p>Tempo: <span class="highlight" id="final-time">-</span></p>

      <!-- Seção de nome -->
      <div id="name-section">
        <input type="text" id="player-name" placeholder="Digite seu nome" maxlength="20" />
        <div class="modal-actions">
          <button id="save-score-btn">💾 Salvar</button>
          <button id="skip-btn">Pular</button>
        </div>
      </div>

      <!-- Seção de ranking -->
      <div id="ranking-section" style="display:none">
        <div id="ranking-list"></div>
        <div class="modal-actions">
          <button id="play-again-btn">🔄 Jogar novamente</button>
          <button id="close-ranking-btn">Fechar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
